<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic* — music that fits the room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E8;
  --black:#0F0F0F;
  --red:#E63946;
  --yellow:#FFD166;
  --teal:#06D6A0;
  --purple:#9B5DE5;
  --orange:#FF6B35;
  --pink:#FF4D6D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--black);cursor:none}

/* PAGE COLOR THEMES */
.theme-landing{background:#2D1B69!important;color:#F5F0E8!important}
.theme-q1{background:#E63946!important;color:#F5F0E8!important}
.theme-q2{background:#1A5C3A!important;color:#F5F0E8!important}
.theme-q3{background:#0D1B4B!important;color:#F5F0E8!important}
.theme-q4{background:#CC4E00!important;color:#F5F0E8!important}
.theme-q5{background:#C2185B!important;color:#F5F0E8!important}
.theme-q6{background:#006D6D!important;color:#F5F0E8!important}
.theme-result{background:#1A0A2E!important;color:#F5F0E8!important}

.theme-landing .landing-wordmark,
.theme-landing .landing-sub,
.theme-q1 .q-text,.theme-q2 .q-text,.theme-q3 .q-text,.theme-q4 .q-text,.theme-q5 .q-text,.theme-q6 .q-text,
.theme-q1 .q-step-ind,.theme-q2 .q-step-ind,.theme-q3 .q-step-ind,.theme-q4 .q-step-ind,.theme-q5 .q-step-ind,.theme-q6 .q-step-ind,
.theme-result .q-text{color:#F5F0E8!important}

.theme-q1 .chip,.theme-q2 .chip,.theme-q3 .chip,.theme-q4 .chip,.theme-q5 .chip,.theme-q6 .chip{border-color:#F5F0E8!important;color:#F5F0E8!important}
.theme-q1 .chip.on,.theme-q2 .chip.on,.theme-q3 .chip.on,.theme-q4 .chip.on,.theme-q5 .chip.on,.theme-q6 .chip.on{background:#F5F0E8!important;color:#0F0F0F!important}
.theme-q1 .next-btn,.theme-q2 .next-btn,.theme-q3 .next-btn,.theme-q4 .next-btn,.theme-q5 .next-btn,.theme-q6 .next-btn{border-color:#F5F0E8!important;color:#F5F0E8!important}
.theme-q1 .next-btn:hover,.theme-q2 .next-btn:hover,.theme-q3 .next-btn:hover,.theme-q4 .next-btn:hover,.theme-q5 .next-btn:hover,.theme-q6 .next-btn:hover{background:#F5F0E8!important;color:#0F0F0F!important}
.theme-q1 .fam-card,.theme-q2 .fam-card,.theme-q3 .fam-card,.theme-q4 .fam-card,.theme-q5 .fam-card,.theme-q6 .fam-card{border-color:#F5F0E8!important;color:#F5F0E8!important}
.theme-q1 .fam-title,.theme-q2 .fam-title,.theme-q3 .fam-title,.theme-q4 .fam-title,.theme-q5 .fam-title,.theme-q6 .fam-title{color:#F5F0E8!important}
.theme-q1 textarea,.theme-q2 textarea,.theme-q3 textarea,.theme-q4 textarea,.theme-q5 textarea,.theme-q6 textarea{border-color:rgba(245,240,232,0.5)!important;color:#F5F0E8!important}
.theme-q1 textarea::placeholder,.theme-q2 textarea::placeholder,.theme-q3 textarea::placeholder,.theme-q4 textarea::placeholder,.theme-q5 textarea::placeholder,.theme-q6 textarea::placeholder{color:rgba(245,240,232,0.4)!important}
.theme-q1 .q-hint,.theme-q2 .q-hint,.theme-q3 .q-hint,.theme-q4 .q-hint,.theme-q5 .q-hint,.theme-q6 .q-hint{color:rgba(245,240,232,0.5)!important}

/* STARS LAYER — always present */
.stars-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;mix-blend-mode:overlay}

.cursor-dot{width:10px;height:10px;background:var(--red);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.chalk-trail{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);animation:fadeTrail 0.5s ease forwards}
@keyframes fadeTrail{0%{opacity:0.9;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.1)}}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--cream);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease,visibility 0.8s ease;overflow:hidden}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-diving{width:240px;height:360px;margin-bottom:-20px}
.loader-diving img{width:100%;height:100%;object-fit:contain}
.loader-wordmark{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;font-style:italic;letter-spacing:-3px;color:var(--black)}
.loader-wordmark em{font-style:normal;color:var(--red)}
.loader-tagline{font-family:'Space Mono',monospace;font-size:9px;color:rgba(15,15,15,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-top:6px}
.chalk-progress{width:220px;height:3px;background:rgba(15,15,15,0.1);border-radius:2px;margin-top:1.5rem;overflow:hidden}
.chalk-fill{height:100%;background:var(--black);border-radius:2px;width:0%;transition:width 0.08s linear}

#app{opacity:0;transition:opacity 0.8s ease;min-height:100vh}
#app.show{opacity:1}

/* PLAYER */
.player-bar{position:fixed;top:1.2rem;right:1.5rem;z-index:500;display:flex;align-items:center;gap:8px;background:var(--black);color:var(--cream);padding:8px 16px;border-radius:100px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;user-select:none}
.player-bar:hover{background:#222}
.player-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.player-waves{display:flex;align-items:center;gap:2px}
.pw{width:2px;background:var(--yellow);border-radius:1px;display:inline-block;animation:wave 0.8s ease-in-out infinite}
.pw:nth-child(1){height:6px}.pw:nth-child(2){height:10px;animation-delay:0.1s}.pw:nth-child(3){height:14px;animation-delay:0.2s}.pw:nth-child(4){height:10px;animation-delay:0.3s}.pw:nth-child(5){height:6px;animation-delay:0.4s}
@keyframes wave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.player-bar.paused .pw{animation:none;height:4px!important}
.player-bar.paused .player-dot{animation:none;opacity:0.3}

/* LANDING */
#landing{height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#2D1B69;text-align:center}

/* PHONE HANGING FROM TOP */

.phone-string{width:2px;height:80px;background:var(--black);opacity:0.4}
.phone-img{width:90px}
.phone-img img{width:100%;object-fit:contain;filter:drop-shadow(2px 4px 12px rgba(0,0,0,0.2))}
@keyframes hangSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

/* SCRIBBLES */
.scribble{position:absolute;pointer-events:none;opacity:0.14}

/* HANDWRITTEN NOTES */
.hw-note{position:absolute;pointer-events:none;font-family:'Space Mono',monospace;font-size:11px;color:var(--black);opacity:0.18;transform:rotate(-8deg);line-height:1.6;letter-spacing:0.02em}
.hw-note.r1{top:22%;left:3%;transform:rotate(-12deg)}
.hw-note.r2{bottom:28%;right:2%;transform:rotate(8deg)}
.hw-note.r3{top:45%;left:2%;transform:rotate(-5deg)}
.hw-circle{position:absolute;pointer-events:none;opacity:0.12}

/* COLLAGE OBJECTS */
.obj{position:absolute;pointer-events:none;user-select:none}
.obj img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(4px 8px 20px rgba(0,0,0,0.15))}
.obj-gramophone{width:200px;bottom:8%;left:1%}
.obj-sushi{width:170px;top:12%;right:3%}
.obj-raspberry{width:140px;bottom:14%;right:2%}
.obj-baguettes{width:140px;top:8%;left:6%}
@keyframes f1{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-18px) rotate(-1deg)}}
@keyframes f2{0%,100%{transform:translateY(0) rotate(-15deg)}50%{transform:translateY(-14px) rotate(-12deg)}}
@keyframes f3{0%,100%{transform:translateY(0) rotate(12deg)}50%{transform:translateY(-20px) rotate(15deg)}}
@keyframes f4{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-12px) rotate(-5deg)}}

/* LANDING CENTER */
.landing-center{position:relative;z-index:10;text-align:center;padding:2rem;max-width:500px}
.landing-wordmark{font-family:'Playfair Display',serif;font-size:96px;font-weight:900;font-style:italic;letter-spacing:-5px;line-height:0.95;color:#F5F0E8;position:relative;display:inline-block;margin-bottom:4px;text-shadow:none}
.landing-wordmark em{font-style:normal;color:#FFD166}
.wm-bg{display:none}
.landing-sub{font-family:'Caveat',cursive;font-size:22px;font-weight:600;color:rgba(255,209,102,0.9);margin-top:8px;margin-bottom:2rem;letter-spacing:0.02em}
.start-btn{padding:16px 44px;background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;border:2.5px solid var(--black);border-radius:100px;cursor:pointer;transition:all 0.15s;box-shadow:4px 4px 0 var(--black);text-transform:uppercase;display:inline-block}
.start-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--black)}
.start-btn:active{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--black)}

/* MARQUEE */
.marquee-wrap{position:absolute;bottom:0;left:0;right:0;overflow:hidden;border-top:2px solid rgba(0,0,0,0.8);padding:10px 0;background:#0F0F0F}
.marquee-track{display:flex;animation:marquee 40s linear infinite;white-space:nowrap}
.marquee-item{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;font-weight:700;color:#F5F0E8;padding:0 2rem;flex-shrink:0}
.marquee-dot{color:#FFD166;font-style:normal;}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* QUESTION SCREEN */
#questionScreen{display:none;min-height:100vh}
#questionScreen.active{display:block}
.q-left{padding:3rem 4rem;display:flex;flex-direction:column;justify-content:center;position:relative;min-height:100vh;max-width:640px;margin:0 auto;background:transparent;width:100%}
.q-right{display:none}
.progress-bar{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(245,240,232,0.15);z-index:10}
.progress-fill{height:100%;background:var(--red);transition:width 0.4s ease}
.q-step-ind{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(245,240,232,0.5);margin-bottom:12px}
.q-text{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;font-style:italic;color:#F5F0E8;margin-bottom:20px;line-height:1.2}
.q-hint{font-family:'Space Mono',monospace;font-size:9px;color:rgba(15,15,15,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}

/* STAGGERED CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}

.chip{padding:10px 0;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--black);background:transparent;color:var(--black);transition:all 0.12s;user-select:none;letter-spacing:0.02em;text-align:center;width:148px}
.chip:hover{background:var(--black);color:var(--cream);transform:translateY(-2px)}
.chip.on{background:var(--black);color:var(--cream)}
.chip.c-amber.on{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
.chip.c-purple.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.chip.c-teal.on{background:var(--teal);color:var(--black);border-color:var(--teal)}
.chip.c-pink.on{background:var(--pink);color:#fff;border-color:var(--pink)}

.fam-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.fam-card{padding:20px;border:2px solid var(--black);border-radius:16px;cursor:pointer;transition:all 0.15s;user-select:none}
.fam-card:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--black)}
.fam-card.on{box-shadow:4px 4px 0 var(--black)}
.fam-card.fam-rings.on{background:var(--yellow);border-color:var(--yellow)}
.fam-card.fam-surprise.on{background:var(--purple);border-color:var(--purple);color:#fff}
.fam-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-style:italic;margin-bottom:4px}
.fam-desc{font-family:'Space Mono',monospace;font-size:10px;line-height:1.5;opacity:0.65}

textarea{width:100%;font-family:'Space Mono',monospace;font-size:12px;height:80px;resize:none;border:2px solid var(--black);border-radius:12px;padding:14px;background:transparent;color:var(--black);outline:none;transition:box-shadow 0.12s;margin-bottom:16px}
textarea:focus{box-shadow:4px 4px 0 var(--black)}
textarea::placeholder{opacity:0.3}

.next-btn{padding:12px 28px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--black);background:transparent;color:var(--black);transition:all 0.12s;display:none;letter-spacing:0.05em;text-transform:uppercase}
.next-btn:hover{background:var(--black);color:var(--cream);transform:translateY(-1px)}
.next-btn.show{display:inline-block}

.generate-btn{width:100%;padding:18px;border:2.5px solid var(--black);border-radius:16px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;font-style:italic;cursor:pointer;background:var(--red);color:#fff;transition:all 0.15s;box-shadow:5px 5px 0 var(--black)}
.generate-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--black)}
.generate-btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:2px 2px 0 #ccc}

.brief-loader{text-align:center;padding:3rem 0;display:none}
.brief-loader.show{display:block}
.brief-spin{width:60px;height:60px;border-radius:50%;background:repeating-radial-gradient(circle at 50%,#1a1a1a 0,#1a1a1a 1px,#2a2a2a 1px,#2a2a2a 4px);animation:spin 1.5s linear infinite;margin:0 auto 1rem;position:relative}
.brief-spin::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:var(--red)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.brief-loader-text{font-family:'Space Mono',monospace;font-size:10px;color:rgba(15,15,15,0.4);letter-spacing:0.15em;text-transform:uppercase}

.error-msg{background:#fff0f0;border:2px solid var(--red);color:var(--red);border-radius:12px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:11px;display:none;margin-top:10px}
.error-msg.show{display:block}

.result{display:none;padding-bottom:3rem}
.result.show{display:block}
.r-banner{border:2px solid rgba(245,240,232,0.3);border-radius:20px;padding:2rem;margin-bottom:1.5rem}
.r-badge{display:inline-block;padding:4px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border:1.5px solid;margin-bottom:12px}
.r-identity{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;font-style:italic;line-height:1.2;margin-bottom:12px;letter-spacing:-1px;color:#F5F0E8}
.r-why{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.75;color:#F5F0E8}
.sec-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:rgba(245,240,232,0.5);margin-bottom:12px;margin-top:2rem}
.artists{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.artist-card{padding:16px;border:2px solid rgba(245,240,232,0.3);border-radius:14px;background:rgba(245,240,232,0.05);transition:all 0.12s}
.artist-card:hover{background:var(--black);color:var(--cream);transform:translateY(-2px);box-shadow:3px 3px 0 rgba(15,15,15,0.3)}
.artist-card:hover .artist-why{color:rgba(245,240,232,0.6)}
.artist-card:hover .artist-spot{color:#1DB954}
.artist-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;font-style:italic;margin-bottom:4px;color:#F5F0E8}
.artist-why{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(245,240,232,0.8);line-height:1.5;transition:color 0.12s}
.artist-spot{display:inline-block;margin-top:8px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#1DB954;text-decoration:none}
.tempo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tempo-card{padding:14px;border:2px solid var(--black);border-radius:14px;text-align:center}
.tempo-tag{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;opacity:0.5}
.tempo-bpm{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;font-style:italic;margin-bottom:3px}
.tempo-desc{font-family:'DM Sans',sans-serif;font-size:11px;line-height:1.4;color:rgba(15,15,15,0.8)}
.t-pre{background:var(--yellow)}.t-peak{background:var(--teal)}.t-late{background:var(--purple);color:#fff}
.t-late .tempo-tag,.t-late .tempo-desc{opacity:0.7}
.avoids{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.avoid-tag{padding:6px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;background:rgba(230,57,70,0.15);color:#FF8A8A;border:1.5px solid rgba(230,57,70,0.5)}
.spotify-btn{display:block;padding:16px 20px;border-radius:14px;background:#1DB954;color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:1rem;transition:all 0.15s;border:2px solid var(--black);box-shadow:3px 3px 0 var(--black);letter-spacing:0.03em}
.spotify-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--black)}
.restart-btn{width:100%;padding:13px;border-radius:14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(245,240,232,0.4);border:2px solid rgba(245,240,232,0.15);transition:all 0.12s;text-transform:uppercase;letter-spacing:0.05em}
.restart-btn:hover{color:var(--black);border-color:var(--black)}

/* RIGHT PANEL - collage on dark */
.rp-obj{position:absolute;pointer-events:none}
.rp-obj img{width:100%;object-fit:contain;filter:drop-shadow(4px 8px 20px rgba(0,0,0,0.4))}
.rp-sushi{width:200px;top:10%;right:5%}
.rp-gramophone{width:180px;bottom:8%;left:3%}
.rp-raspberry{width:130px;top:8%;left:8%}

.rp-scribble{position:absolute;pointer-events:none;opacity:0.15}

@media(max-width:768px){
  #questionScreen.active{grid-template-columns:1fr}
  .q-right{display:none}
  .q-left{padding:2rem 1.5rem}
  .landing-wordmark{font-size:60px}
}
</style>
</head>
<body class="theme-landing">
<div class="cursor-dot" id="cursorDot"></div>
<audio id="bgMusic" loop preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<!-- LOADER -->
<div id="loader">
  <!-- diving lady animates downward into martini — whole image moves -->
  <div style="position:relative;width:260px;height:380px;margin:0 auto;overflow:hidden">
    <div id="loaderDiver" style="position:absolute;top:-60px;left:0;width:100%;transition:top 3.2s cubic-bezier(0.4,0,0.8,1)">
      <img src="dive.png" style="width:100%;object-fit:contain"/>
    </div>
  </div>
  <div class="loader-wordmark" style="margin-top:1rem">folio<em>*</em></div>
  <div class="loader-tagline">music that fits the room</div>
  <!-- chunky bar with % inside -->
  <div style="width:280px;height:32px;background:rgba(15,15,15,0.1);border-radius:100px;margin-top:1.2rem;border:2.5px solid #0F0F0F;overflow:hidden;position:relative">
    <div id="chalkFill" style="height:100%;width:0%;border-radius:100px;transition:width 0.08s linear,background 0.3s;position:relative"></div>
    <div id="loaderPct" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Space Mono,monospace;font-size:12px;font-weight:700;color:#0F0F0F;letter-spacing:0.05em;mix-blend-mode:multiply">0%</div>
  </div>
</div>

<!-- STARS LAYER — persists across all pages -->
<div class="stars-layer" id="starsLayer">
  <svg style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.12" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="wavePattern" x="0" y="0" width="100%" height="60" patternUnits="userSpaceOnUse">

<script>
// CURSOR
const dot=document.getElementById('cursorDot');
const trailColors=['#E63946','#FFD166','#9B5DE5','#06D6A0','#FF6B35','#FF4D6D'];
let lastX=0,lastY=0,lastTrail=0;
document.addEventListener('mousemove',e=>{
  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
  const now=Date.now();
  if(now-lastTrail>25){
    lastTrail=now;
    if(Math.hypot(e.clientX-lastX,e.clientY-lastY)>6){
      const t=document.createElement('div');t.className='chalk-trail';
      const sz=Math.random()*12+5,col=trailColors[Math.floor(Math.random()*trailColors.length)],rot=Math.random()*360,sq=Math.random()>0.6;
      t.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;background:${col};border-radius:${sq?'20%':'50%'};transform:translate(-50%,-50%) rotate(${rot}deg)`;
      document.body.appendChild(t);setTimeout(()=>t.remove(),600);
      lastX=e.clientX;lastY=e.clientY;
    }
  }
});

// MARQUEE
const marqItems=[
  'Tokyo has over 300 jazz kissa — bars where talking during music is considered rude','✦',
  'Studies show minor keys make wine taste more bitter','✦',
  'Noma changes its entire playlist with every seasonal menu','✦',
  'Tempo above 120 BPM makes people eat 23% faster','✦',
  'Bill Evans refused to play if restaurant noise exceeded his piano','✦',
  'The first elevator music was played by live musicians in Otis elevators','✦',
  'Loud music doesn\'t just change the vibe — it changes what people order','✦',
];
const track=document.getElementById('marquee');
const doubled=[...marqItems,...marqItems];
track.innerHTML=doubled.map(i=>i==='✦'?`<span class="marquee-item"><span class="marquee-dot">✦</span></span>`:`<span class="marquee-item">${i}</span>`).join('');

// LOADER
let prog=0;
const fillEl=document.getElementById('chalkFill');
const pctEl=document.getElementById('loaderPct');
const diver=document.getElementById('loaderDiver');



const barColors=[
  {at:0,   color:'#FFD166'},
  {at:25,  color:'#06D6A0'},
  {at:50,  color:'#9B5DE5'},
  {at:75,  color:'#E63946'},
  {at:90,  color:'#FF6B35'},
];
const pctColors=['#E63946','#9B5DE5','#06D6A0','#FFD166','#FF6B35'];

const pi=setInterval(()=>{
  prog+=Math.random()*2.5+0.5;
  if(prog>=100){prog=100;clearInterval(pi);}
  
  // update bar width
  fillEl.style.width=prog+'%';
  
  // update bar color
  let barCol='#FFD166';
  for(let i=barColors.length-1;i>=0;i--){if(prog>=barColors[i].at){barCol=barColors[i].color;break;}}
  fillEl.style.background=barCol;
  
  // update percentage text
  pctEl.textContent=Math.round(prog)+'%';
  pctEl.style.color=barCol;
  
  // animate diver downward as progress increases — starts at top, moves toward martini
  // animate from -60px to 80px — diving into the martini
  const diverTop=-60 + (prog/100)*140;
  diver.style.top=diverTop+'px';
  
},60);

setTimeout(()=>{
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').classList.add('show');
  setTimeout(()=>{const m=document.getElementById('bgMusic');m.volume=0.12;m.play().catch(()=>{});},500);
},3500);

function toggleMusic(){
  const m=document.getElementById('bgMusic'),bar=document.getElementById('playerBar'),lbl=document.getElementById('playerLabel');
  if(m.paused){m.play();bar.classList.remove('paused');lbl.textContent='now playing';}
  else{m.pause();bar.classList.add('paused');lbl.textContent='tap to play';}
}

function getAudioCtx(){return new(window.AudioContext||window.webkitAudioContext)();}

// Mario coin sound — chip selection
function playChipSound(){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='square';
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(987,ctx.currentTime);
    o.frequency.setValueAtTime(1318,ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
    o.start();o.stop(ctx.currentTime+0.2);
  }catch(e){}
}

// Mario 1-up sound — brief appears
function playResultSound(){
  try{
    const ctx=getAudioCtx();
    const notes=[523,659,784,1047,659,784,1047,1319];
    const times=[0,0.08,0.16,0.24,0.32,0.40,0.48,0.56];
    notes.forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(freq,ctx.currentTime+times[i]);
      g.gain.setValueAtTime(0.1,ctx.currentTime+times[i]);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+times[i]+0.1);
      o.start(ctx.currentTime+times[i]);
      o.stop(ctx.currentTime+times[i]+0.12);
    });
  }catch(e){}
}

// Mario power-up — generate button
function playGenSound(){
  try{
    const ctx=getAudioCtx();
    const notes=[261,329,392,523,659,784,1047];
    const times=[0,0.07,0.14,0.21,0.28,0.35,0.42];
    notes.forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(freq,ctx.currentTime+times[i]);
      g.gain.setValueAtTime(0.1,ctx.currentTime+times[i]);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+times[i]+0.09);
      o.start(ctx.currentTime+times[i]);
      o.stop(ctx.currentTime+times[i]+0.1);
    });
  }catch(e){}
}

const STEPS=[
  {id:'cuisine',q:"What are you serving?",type:'chips',color:'c-amber',multi:false,staggered:true,options:['North Indian','South Indian','Coastal seafood','Italian','Japanese','Mediterranean','Modern continental','Street food','Korean','Middle Eastern','Cafe']},
  {id:'vibe',q:"What does your space feel like?",type:'chips',color:'c-purple',multi:true,staggered:false,options:['Intimate and romantic','Lively and social','Quiet and contemplative','Celebratory','Luxurious and refined','Cool and effortless','Nostalgic and warm']},
  {id:'time',q:"When do you serve?",type:'chips',color:'c-teal',multi:false,staggered:false,options:['Breakfast and brunch','Lunch','Dinner','Late night','All day']},
  {id:'crowd',q:"Who comes through your door?",type:'chips',color:'c-pink',multi:true,staggered:false,options:['Couples','Friend groups','Business diners','Families','Solo diners','Young professionals']},
  {id:'familiarity',q:"What should the music do?",type:'familiarity'},
  {id:'extra',q:"Anything else about your space?",type:'text',placeholder:"Rooftop, open kitchen, heritage building, natural wine, late night, very loud... or leave blank."}
];

let answers={},current=0;

const stepThemes=['theme-q1','theme-q2','theme-q3','theme-q4','theme-q5','theme-q6'];

function setTheme(theme){
  document.body.className='';
  document.body.classList.add(theme);
}

function startApp(){
  document.getElementById('landing').style.display='none';
  document.getElementById('questionScreen').classList.add('active');
  showStep(0);
}

function updateProgress(i){document.getElementById('progressFill').style.width=((i/STEPS.length)*100)+'%';}

function showStep(i){
  updateProgress(i);
  if(i<stepThemes.length) setTheme(stepThemes[i]);
  if(i>=STEPS.length){showGenerate();return;}
  const s=STEPS[i];
  const container=document.getElementById('qContent');
  let html='';
  if(s.type==='chips'){
    html=`<div class="q-step-ind">0${i+1} / 06</div><div class="q-text">${s.q}</div>`;
    if(s.multi) html+=`<div class="q-hint">Select all that apply</div>`;
    html+=`<div class="chips" id="chips-${s.id}">`;
    s.options.forEach(o=>html+=`<div class="chip ${s.color}" data-v="${o}">${o}</div>`);
    html+=`</div><button class="next-btn" id="next-${s.id}">Next →</button>`;
  } else if(s.type==='familiarity'){
    html=`<div class="q-step-ind">05 / 06</div><div class="q-text">${s.q}</div>
    <div class="fam-row">
      <div class="fam-card fam-rings" data-v="familiar" id="famRings"><div class="fam-title">Rings a bell</div><div class="fam-desc">Music they already love, just better chosen</div></div>
      <div class="fam-card fam-surprise" data-v="discovery" id="famSurprise"><div class="fam-title">Surprise me</div><div class="fam-desc">The kind that makes them reach for Shazam</div></div>
    </div>
    <button class="next-btn" id="next-familiarity">Next →</button>`;
  } else {
    html=`<div class="q-step-ind">06 / 06</div><div class="q-text">${s.q}</div><textarea id="txtExtra" placeholder="${s.placeholder}"></textarea><button class="next-btn show" id="next-extra">Next →</button>`;
  }
  container.innerHTML=html;

  if(s.type==='chips'){
    const chipsEl=container.querySelector(`#chips-${s.id}`);
    const nextBtn=container.querySelector(`#next-${s.id}`);
    chipsEl.addEventListener('click',e=>{
      const chip=e.target.closest('.chip');if(!chip)return;
      playChipSound();
      if(s.multi){chip.classList.toggle('on');}
      else{chipsEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));chip.classList.add('on');}
      const sel=[...chipsEl.querySelectorAll('.chip.on')].map(c=>c.dataset.v);
      answers[s.id]=s.multi?sel.join(', '):sel[0];
      nextBtn.classList.toggle('show',sel.length>0);
    });
    nextBtn.addEventListener('click',()=>{if(answers[s.id]){current=i+1;window.scrollTo(0,0);showStep(current);}});
  } else if(s.type==='familiarity'){
    const nextBtn=container.querySelector('#next-familiarity');
    ['famRings','famSurprise'].forEach(id=>{
      container.querySelector('#'+id).addEventListener('click',function(){
        playChipSound();
        container.querySelectorAll('.fam-card').forEach(c=>c.classList.remove('on'));
        this.classList.add('on');answers.familiarity=this.dataset.v;nextBtn.classList.add('show');
      });
    });
    nextBtn.addEventListener('click',()=>{current=i+1;window.scrollTo(0,0);showStep(current);});
  } else {
    container.querySelector('#next-extra').addEventListener('click',()=>{
      answers.extra=container.querySelector('#txtExtra').value.trim();current=i+1;window.scrollTo(0,0);showStep(current);
    });
  }
}

function showGenerate(){
  updateProgress(STEPS.length);
  document.getElementById('qContent').innerHTML=`
    <div class="q-step-ind">READY</div>
    <div class="q-text" style="margin-bottom:20px">Your space is ready for its folio.</div>
    <button class="generate-btn" id="genBtn">Set the mood ✦</button>`;
  document.getElementById('genBtn').addEventListener('click',generate);
}

function buildPrompt(){
  return `Generate a sonic brief for this restaurant. Be deeply culturally specific — name exact eras, cities, scenes, movements. Never recommend anything generic or obvious. Inputs: Cuisine: ${answers.cuisine}, Vibe: ${answers.vibe}, Service: ${answers.time}, Crowd: ${answers.crowd}, Music direction: ${answers.familiarity==='familiar'?'familiar and nostalgic — music they already know and love, just better chosen':'discovery — music that surprises and makes people reach for Shazam'}, Extra context: ${answers.extra||'none'}.

Respond with ONLY valid JSON, no markdown, no explanation:
{"identity":"one punchy evocative line capturing this restaurant's sonic soul","badge":"2-3 word genre or scene label that feels discovered not generic","color":"amber or purple or teal or pink","why":"2-3 sentences with specific cultural reasoning — name the exact era, geography, scene or movement. No vague genre names.","artists":[{"name":"Artist name","why":"one specific culturally grounded sentence","search":"spotify search query for playlists"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"}],"tempo":{"pre":{"bpm":"BPM range","desc":"specific mood for pre-service"},"peak":{"bpm":"BPM range","desc":"specific mood for peak service"},"late":{"bpm":"BPM range","desc":"specific mood for wind down"}},"avoid":["specific thing to avoid","specific thing","specific thing","specific thing"],"spotifyQuery":"search terms that surface PLAYLISTS on Spotify — include words like playlist mix collection session"}`;
}

async function generate(){
  const btn=document.getElementById('genBtn');
  playGenSound();btn.disabled=true;btn.textContent='Composing...';
  document.getElementById('briefLoader').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('qContent').style.display='none';
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:buildPrompt()})});
    const data=await res.json();
    if(!data.result)throw new Error();
    renderResult(data.result);
  }catch(e){
    document.getElementById('briefLoader').classList.remove('show');
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('qContent').style.display='block';
    btn.disabled=false;btn.textContent='Set the mood ✦';
  }
}

const colorMap={
  amber:{bg:'#FFFBF0',border:'#FFD166',badgeBg:'#FFD166',badgeText:'#412402'},
  purple:{bg:'#F5F0FF',border:'#9B5DE5',badgeBg:'#9B5DE5',badgeText:'#fff'},
  teal:{bg:'#F0FFF8',border:'#06D6A0',badgeBg:'#06D6A0',badgeText:'#04342C'},
  pink:{bg:'#FFF0F3',border:'#FF4D6D',badgeBg:'#FF4D6D',badgeText:'#fff'}
};

function renderResult(raw){
  document.getElementById('briefLoader').classList.remove('show');
  try{
    const clean=raw.replace(/```json|```/g,'').trim();
    const d=JSON.parse(clean);
    const c=colorMap[d.color]||colorMap.amber;
    const banner=document.getElementById('rBanner');
    banner.style.background=c.bg;banner.style.borderColor=c.border;
    const badge=document.getElementById('rBadge');
    badge.style.background=c.badgeBg;badge.style.color=c.badgeText;badge.style.borderColor=c.border;badge.textContent=d.badge;
    document.getElementById('rIdentity').textContent=d.identity;
    document.getElementById('rWhy').textContent=d.why;
    document.getElementById('rArtists').innerHTML=d.artists.map(a=>`
      <div class="artist-card">
        <div class="artist-name">${a.name}</div>
        <div class="artist-why">${a.why}</div>
        <a class="artist-spot" href="https://open.spotify.com/search/${encodeURIComponent(a.search+' playlist')}/playlists" target="_blank">Find playlists ↗</a>
      </div>`).join('');
    document.getElementById('rPreBpm').textContent=d.tempo.pre.bpm;
    document.getElementById('rPreDesc').textContent=d.tempo.pre.desc;
    document.getElementById('rPeakBpm').textContent=d.tempo.peak.bpm;
    document.getElementById('rPeakDesc').textContent=d.tempo.peak.desc;
    document.getElementById('rLateBpm').textContent=d.tempo.late.bpm;
    document.getElementById('rLateDesc').textContent=d.tempo.late.desc;
    document.getElementById('rAvoid').innerHTML=d.avoid.map(a=>`<div class="avoid-tag">${a}</div>`).join('');
    document.getElementById('rSpotify').href=`https://open.spotify.com/search/${encodeURIComponent(d.spotifyQuery+' playlist')}/playlists`;
    document.getElementById('result').classList.add('show');playResultSound();setTheme('theme-result');
    setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth'}),100);
  }catch(e){document.getElementById('errorMsg').classList.add('show');}
}

function restart(){
  answers={};current=0;
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('landing').style.display='flex';
  document.getElementById('result').classList.remove('show');
  document.getElementById('briefLoader').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('qContent').style.display='block';
  document.getElementById('progressFill').style.width='0%';
}
</script>
