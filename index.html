<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — music that fits the room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:#F5E6B0;color:#0F0F0F;cursor:none}

/* CURSOR */
.cursor{width:10px;height:10px;background:#fff;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
.trail{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);border-radius:50%;animation:trailFade 0.4s ease forwards;mix-blend-mode:difference}
@keyframes trailFade{0%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.1)}}

/* WAVE BG */
.wave-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:0.15}
.wave-bg svg{width:100%;height:100%}

/* LOADER */
#loader{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F5E6B0;transition:opacity 0.6s ease,visibility 0.6s ease}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-wordmark{font-family:'Playfair Display',serif;font-size:64px;font-weight:900;font-style:italic;letter-spacing:2px;color:#0F0F0F;}
.loader-wordmark em{font-style:normal;color:#E63946}
.loader-tag{font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:rgba(0,0,0,0.45);margin-top:6px;margin-bottom:2rem}
.loader-bar-wrap{width:280px;height:32px;background:rgba(0,0,0,0.06);border-radius:100px;border:2.5px solid #0F0F0F;overflow:hidden;position:relative}
.loader-bar{display:none}
.loader-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#0F0F0F;letter-spacing:0.05em}

/* PLAYER */
.player{position:fixed;top:1.2rem;right:1.5rem;z-index:500;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.2);color:#fff;padding:8px 16px;border-radius:100px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.08em;cursor:pointer;user-select:none;border:1.5px solid rgba(255,255,255,0.4);backdrop-filter:blur(4px)}
.player:hover{background:rgba(0,0,0,0.3)}
.pdot{width:6px;height:6px;border-radius:50%;background:#FFD166;animation:pdotPulse 1.5s infinite}
@keyframes pdotPulse{0%,100%{opacity:1}50%{opacity:0.3}}
.pwaves{display:flex;align-items:center;gap:2px}
.pw{width:2px;background:#fff;border-radius:1px;display:inline-block;animation:pwAnim 0.8s ease-in-out infinite}
.pw:nth-child(1){height:6px}.pw:nth-child(2){height:10px;animation-delay:.1s}.pw:nth-child(3){height:14px;animation-delay:.2s}.pw:nth-child(4){height:10px;animation-delay:.3s}.pw:nth-child(5){height:6px;animation-delay:.4s}
@keyframes pwAnim{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.player.paused .pw{animation:none;height:4px!important}
.player.paused .pdot{animation:none;opacity:0.3}

/* PROGRESS */
.prog-bar{position:fixed;top:0;left:0;right:0;height:4px;background:transparent;z-index:100}
.prog-fill{height:100%;background:#0F0F0F;transition:width 0.4s ease}

/* MARQUEE */
.marquee-wrap{display:none}
.marquee-track{display:flex;animation:marqueeSroll 40s linear infinite;white-space:nowrap}
.marquee-item{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;font-weight:700;color:rgba(255,255,255,0.9);padding:0 2rem;flex-shrink:0}
.marquee-sep{color:#FFD166;font-style:normal}
@keyframes marqueeSroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* LANDING */
#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;transition:opacity 0.25s}
#landing.hide{opacity:0;pointer-events:none}
.wordmark{font-family:'Playfair Display',serif;font-size:100px;font-weight:900;font-style:italic;letter-spacing:-5px;line-height:1;color:#0F0F0F;display:inline-block;}
.wordmark em{font-style:normal;color:#E63946}
.tagline{font-family:'DM Serif Display',serif;font-style:italic;font-size:20px;color:rgba(0,0,0,0.5);margin-top:8px;margin-bottom:2.5rem}
.cta-btn{padding:16px 48px;background:#fff;color:#0F0F0F;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;border:2.5px solid #0F0F0F;border-radius:100px;cursor:pointer;transition:all 0.15s;box-shadow:4px 4px 0 #0F0F0F;text-transform:uppercase}
.cta-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #0F0F0F}
.cta-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #0F0F0F}

/* QUESTION SCREEN */
#qScreen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2rem 5rem;z-index:10;transition:background 0.35s}
#qScreen.show{display:flex}
.q-wrap{width:100%;max-width:560px;position:relative;z-index:2}
.q-num{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.4);margin-bottom:12px}
.q-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;font-style:italic;color:#0F0F0F;margin-bottom:20px;line-height:1.2}
.q-hint{font-family:'Space Mono',monospace;font-size:9px;color:rgba(0,0,0,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}

/* CHIPS — retro shadow */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.chip{padding:10px 16px;min-width:140px;text-align:center;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border:2px solid #0F0F0F;background:transparent;color:#0F0F0F;transition:all 0.12s;user-select:none;box-shadow:3px 3px 0 #0F0F0F}
.chip:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #0F0F0F}
.chip.on{box-shadow:4px 4px 0 #0F0F0F;transform:translate(-1px,-1px)}

/* FAMILIARITY */
.fam-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;width:100%}
.fam-card{padding:22px;border:2px solid #0F0F0F;border-radius:16px;cursor:pointer;transition:all 0.15s;user-select:none;box-shadow:3px 3px 0 #0F0F0F}
.fam-card:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #0F0F0F}
.fam-card.on{background:rgba(255,255,255,0.2);border-color:#fff;box-shadow:4px 4px 0 #0F0F0F;transform:translate(-1px,-1px)}
.fam-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-style:italic;color:#0F0F0F;margin-bottom:4px}
.fam-desc{font-family:'Space Mono',monospace;font-size:10px;line-height:1.5;color:rgba(0,0,0,0.55)}

textarea{width:100%;font-family:'Space Mono',monospace;font-size:12px;height:80px;resize:none;border:2px solid #0F0F0F;border-radius:12px;padding:14px;background:rgba(255,255,255,0.3);color:#0F0F0F;outline:none;margin-bottom:16px;box-shadow:3px 3px 0 #0F0F0F}
textarea:focus{border-color:#fff;background:rgba(255,255,255,0.15)}
textarea::placeholder{color:rgba(0,0,0,0.35)}

.next-btn{padding:12px 28px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border:2px solid #0F0F0F;background:transparent;color:#0F0F0F;transition:transform 0.12s,box-shadow 0.12s;display:none;letter-spacing:0.05em;text-transform:uppercase;box-shadow:3px 3px 0 #0F0F0F}
.next-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #0F0F0F}
.next-btn.show{display:inline-block}

.gen-btn{width:100%;padding:18px;border:2.5px solid #0F0F0F;border-radius:16px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;font-style:italic;cursor:pointer;background:#0F0F0F;color:#fff;transition:all 0.15s;box-shadow:5px 5px 0 #0F0F0F}
.gen-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 #0F0F0F}
.gen-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #0F0F0F}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:2px 2px 0 #0F0F0F}

/* BRIEF LOADER */
.brief-load{text-align:center;padding:3rem 0;display:none}
.brief-load.show{display:block}
.brief-spin{width:60px;height:60px;border-radius:50%;background:repeating-radial-gradient(circle at 50%,#0F0F0F 0,#0F0F0F 1px,rgba(0,0,0,0.1) 1px,rgba(0,0,0,0.1) 4px);animation:spin 1.5s linear infinite;margin:0 auto 1rem;position:relative}
.brief-spin::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#E63946}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.brief-load-txt{font-family:'Space Mono',monospace;font-size:10px;color:rgba(0,0,0,0.5);letter-spacing:0.15em;text-transform:uppercase}

.err-msg{background:rgba(0,0,0,0.15);border:1.5px solid rgba(255,255,255,0.4);color:#fff;border-radius:12px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:11px;display:none;margin-top:10px}
.err-msg.show{display:block}

/* RESULT */
#resultScreen{position:fixed;inset:0;display:none;overflow-y:auto;z-index:10;padding:2rem 2rem 6rem;background:#F5E6B0}
#resultScreen.show{display:block}
.result-inner{max-width:560px;margin:0 auto;padding-top:2rem}
.r-banner{border:2.5px solid rgba(0,0,0,0.15);border-radius:20px;padding:2rem;margin-bottom:1.5rem;box-shadow:4px 4px 0 #0F0F0F}
.r-badge{display:inline-block;padding:4px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border:2px solid;margin-bottom:12px;box-shadow:2px 2px 0 #0F0F0F}
.r-identity{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;font-style:italic;line-height:1.2;margin-bottom:12px;letter-spacing:-1px;color:#0F0F0F;}
.r-why{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.75;color:rgba(0,0,0,0.7)}
.sec-lbl{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:rgba(0,0,0,0.4);margin-bottom:12px;margin-top:2rem}
.artists{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.a-card{padding:16px;border:2px solid rgba(0,0,0,0.15);border-radius:14px;background:#fff;transition:all 0.12s;cursor:default;box-shadow:3px 3px 0 #0F0F0F}
.a-card:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #0F0F0F}
.a-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;font-style:italic;margin-bottom:4px;color:#0F0F0F}
.a-why{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(0,0,0,0.6);line-height:1.5}
.a-spot{display:block;margin-top:12px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#1DB954;text-decoration:none}
.tempo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.t-card{padding:14px;border-radius:14px;text-align:center;border:2px solid rgba(0,0,0,0.1);box-shadow:3px 3px 0 #0F0F0F}
.t-tag{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;opacity:0.7}
.t-bpm{font-family:'Playfair Display',serif;font-size:15px;font-weight:900;font-style:italic;margin-bottom:3px}
.t-desc{font-family:'DM Sans',sans-serif;font-size:11px;line-height:1.4;opacity:0.75}
.t-pre{background:#FFD166;color:#412402}
.t-peak{background:#B5C9B1;color:#1A3D2B}
.t-late{background:#C9C0E8;color:#2D1B69}
.avoids{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.avoid{padding:6px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;background:#fff;color:#E63946;border:2px solid #E63946;box-shadow:2px 2px 0 #0F0F0F}
.spot-btn{display:block;padding:16px 20px;border-radius:14px;background:#1DB954;color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:1rem;transition:all 0.15s;border:2px solid rgba(0,0,0,0.15);box-shadow:4px 4px 0 #0F0F0F}
.spot-btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 #0F0F0F}
.restart{width:100%;padding:13px;border-radius:14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(0,0,0,0.4);border:2px solid rgba(0,0,0,0.15);transition:all 0.12s;text-transform:uppercase;letter-spacing:0.05em;box-shadow:2px 2px 0 #0F0F0F}
.restart:hover{color:#0F0F0F;border-color:rgba(0,0,0,0.3);transform:translate(-1px,-1px);box-shadow:3px 3px 0 #0F0F0F}

/* PASTEL BG PER STEP */
.bg-q0{background:#FFD166}.bg-q0 .q-num,.bg-q0 .q-title,.bg-q0 .q-hint{color:#0F0F0F!important}.bg-q0 .chip{border-color:#0F0F0F!important;color:#0F0F0F!important}.bg-q0 .chip.on{box-shadow:4px 4px 0 #0F0F0F!important}.bg-q0 .next-btn{border-color:#0F0F0F!important;color:#0F0F0F!important}.bg-q0 .next-btn:hover{background:#0F0F0F!important;color:#FFD166!important}.bg-q0 .gen-btn{border-color:#0F0F0F!important;color:#0F0F0F!important}
.bg-q1{background:#B5C9B1}
.bg-q2{background:#C9C0E8}
.bg-q3{background:#F5CBA7}
.bg-q4{background:#F4B8C1}
.bg-q5{background:#A8D8C8}

@media(max-width:480px){
  .wordmark{font-size:64px;letter-spacing:0px}
  .loader-wordmark{font-size:44px;letter-spacing:1px}
  .tagline{font-size:17px}
  .loader-tag{font-size:15px}
  .loader-bar-wrap{width:240px}
  .q-wrap{padding:0 0.5rem}
  .q-title{font-size:24px;margin-bottom:14px}
  .chips{gap:8px}
  .chip{min-width:0;width:calc(50% - 5px);padding:10px 8px;font-size:10px}
  
  .fam-card{padding:16px}
  .fam-title{font-size:16px}
  .gen-btn{font-size:18px;padding:15px}
  .result-inner{padding-top:1rem}
  .r-identity{font-size:20px}
  .r-why{font-size:13px}
  .artists{grid-template-columns:1fr}
  .tempo-row{grid-template-columns:1fr}
  .t-card{padding:12px;display:flex;align-items:center;gap:12px;text-align:left}
  .t-tag{margin-bottom:0;min-width:80px}
  .t-bpm{margin-bottom:0}
  .sec-lbl{margin-top:1.5rem}
  #qScreen{padding:1.5rem 1.5rem 5rem}
  .next-btn{padding:10px 20px;font-size:10px}
  .r-banner{padding:1.5rem}
  .avoid-tag{font-size:9px;padding:5px 10px}
  .spot-btn{font-size:11px;padding:14px}
  .restart{font-size:10px}
  .player{font-size:8px;padding:6px 12px;top:0.8rem;right:0.8rem}
}
@media(max-width:360px){
  .wordmark{font-size:52px}
  .chip{font-size:9px}
  .q-title{font-size:20px}
}
</style>
</head>

<audio id="bgMusic" loop preload="auto">

<!-- LOADER -->
<div id="loader">
  <div style="position:relative;width:240px;height:240px;margin-bottom:2rem">
    <img src="wine.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:1;transition:opacity 0.5s ease;width:200px;height:200px"/>
    <img src="egg.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s ease;width:200px;height:200px"/>
    <img src="cherry.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s ease;width:200px;height:200px"/>
    <img src="disco.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s ease;width:200px;height:200px"/>
    <img src="fish.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s ease;width:200px;height:200px"/>

<div id="resultScreen">
  <div class="result-inner">

      <div class="r-badge" id="rBadge"></div>

    </div>

    <div class="artists" id="rArtists"></div>
    <div class="sec-lbl">Tempo by service</div>
    <div class="tempo-row">
      <div class="t-card t-pre"><div class="t-tag">Pre-service</div><div class="t-bpm" id="rPreBpm"></div><div class="t-desc" id="rPreDesc"></div></div>
      <div class="t-card t-peak"><div class="t-tag">Peak service</div><div class="t-bpm" id="rPeakBpm"></div><div class="t-desc" id="rPeakDesc"></div></div>
      <div class="t-card t-late"><div class="t-tag">Wind down</div><div class="t-bpm" id="rLateBpm"></div><div class="t-desc" id="rLateDesc"></div></div>

</div>

<script>
// CURSOR
const cur=document.getElementById('cursor');
const tc=['#E63946','#FFD166','#9B5DE5','#06D6A0','#FF6B35','#FF4D6D'];
let lx=0,ly=0,lt=0;
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  const now=Date.now();
  if(now-lt>25&&Math.hypot(e.clientX-lx,e.clientY-ly)>6){
    lt=now;
    const t=document.createElement('div');t.className='trail';
    const sz=Math.random()*10+5,col=tc[Math.floor(Math.random()*tc.length)];
    t.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;background:${col}`;
    document.body.appendChild(t);setTimeout(()=>t.remove(),400);
    lx=e.clientX;ly=e.clientY;
  }
});

// MARQUEE
const mi=['Tokyo has over 300 jazz kissa — bars where talking during music is considered rude','✦','Studies show minor keys make wine taste more bitter','✦','Noma changes its entire playlist with every seasonal menu','✦','Tempo above 120 BPM makes people eat 23% faster','✦','Bill Evans refused to play if restaurant noise exceeded his piano','✦','Loud music changes not just the vibe — it changes what people order','✦'];
const mk=document.getElementById('marquee');
const md=[...mi,...mi];
mk.innerHTML=md.map(i=>i==='✦'?`<span class="marquee-item"><span class="marquee-sep">✦</span></span>`:`<span class="marquee-item">${i}</span>`).join('');

// LOADER
let prog=0;
const bar=document.getElementById('loaderBar');
const pct=document.getElementById('loaderPct');
const barColors=[{at:0,c:'#FFD166'},{at:25,c:'#A8D8C8'},{at:50,c:'#C9C0E8'},{at:75,c:'#F4B8C1'},{at:90,c:'#B5C9B1'}];
const pi=setInterval(()=>{
  prog+=Math.random()*2.5+0.5;
  if(prog>=100){prog=100;clearInterval(pi);}
  // snap to nearest 2px chunk for pixel effect
  const snapped=Math.floor(prog/2)*2;
  pct.textContent=Math.round(prog)+'%';
  let bc='#FFD166';
  for(let i=barColors.length-1;i>=0;i--){if(prog>=barColors[i].at){bc=barColors[i].c;break;}}
  // draw pixel blocks on canvas
  const canvas=bar;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const totalBlocks=20;
  const filledBlocks=Math.floor(prog/100*totalBlocks);
  const blockW=Math.floor((canvas.width-2)/totalBlocks)-2;
  const blockH=canvas.height-6;
  const gap=2;
  const startX=2;
  for(let i=0;i<filledBlocks;i++){
    ctx.fillStyle=bc;
    ctx.beginPath();
    const x=startX+i*(blockW+gap);
    ctx.roundRect(x,3,blockW,blockH,3);
    ctx.fill();
  }
},80);
// cycle doodles with crossfade
const doodleImgs = document.querySelectorAll('#loader img');
let doodleIdx = 0;
setInterval(()=>{
  const prev = doodleIdx;
  doodleIdx = (doodleIdx + 1) % doodleImgs.length;
  doodleImgs[doodleIdx].style.opacity = '1';
  setTimeout(()=>{ doodleImgs[prev].style.opacity = '0'; }, 50);
}, 600);

setTimeout(()=>{
  document.getElementById('loader').classList.add('hide');
  setTimeout(()=>{const m=document.getElementById('bgMusic');m.volume=0.12;m.play().catch(()=>{});},300);
},6000);

function toggleMusic(){
  const m=document.getElementById('bgMusic'),p=document.getElementById('player'),l=document.getElementById('playerLbl');
  if(m.paused){m.play();p.classList.remove('paused');l.textContent='now playing';}
  else{m.pause();p.classList.add('paused');l.textContent='tap to play';}
}

function coinSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.type='square';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(987,c.currentTime);o.frequency.setValueAtTime(1318,c.currentTime+0.08);g.gain.setValueAtTime(0.1,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start();o.stop(c.currentTime+0.2);}catch(e){}}
function powerUp(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[261,329,392,523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='square';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,c.currentTime+i*0.07);g.gain.setValueAtTime(0.08,c.currentTime+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.07+0.09);o.start(c.currentTime+i*0.07);o.stop(c.currentTime+i*0.07+0.1);});}catch(e){}}
function oneUp(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047,659,784,1047,1319].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='square';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,c.currentTime+i*0.08);g.gain.setValueAtTime(0.08,c.currentTime+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.08+0.1);o.start(c.currentTime+i*0.08);o.stop(c.currentTime+i*0.08+0.12);});}catch(e){}}

const STEPS=[
  {id:'cuisine',q:"What are you serving?",type:'chips',multi:false,bg:'bg-q0',options:['North Indian','South Indian','Coastal seafood','Italian','Japanese','Mediterranean','Modern continental','Street food','Korean','Middle Eastern','Cafe']},
  {id:'vibe',q:"What does your space feel like?",type:'chips',multi:true,bg:'bg-q1',options:['Intimate and romantic','Lively and social','Quiet and contemplative','Celebratory','Luxurious and refined','Cool and effortless','Nostalgic and warm']},
  {id:'time',q:"When do you serve?",type:'chips',multi:false,bg:'bg-q2',options:['Breakfast and brunch','Lunch','Dinner','Late night','All day']},
  {id:'crowd',q:"Who comes through your door?",type:'chips',multi:true,bg:'bg-q3',options:['Couples','Friend groups','Business diners','Families','Solo diners','Young professionals']},
  {id:'familiarity',q:"What should the music do?",type:'familiarity',bg:'bg-q4'},
  {id:'extra',q:"Anything else about your space?",type:'text',bg:'bg-q5',placeholder:"Rooftop, open kitchen, heritage building, natural wine, late night... or leave blank."}
];
let answers={},current=0;
const qScreen=document.getElementById('qScreen');
const landing=document.getElementById('landing');

function startApp(){
  landing.classList.add('hide');
  qScreen.classList.add('show');
  showStep(0);
}

function setProgress(i){document.getElementById('progFill').style.width=((i/STEPS.length)*100)+'%';}

function showStep(i){
  setProgress(i);
  if(i>=STEPS.length){showGenerate();return;}
  const s=STEPS[i];
  qScreen.className='show '+s.bg;
  const c=document.getElementById('qContent');
  let html=`<div class="q-num">0${i+1} / 06</div><div class="q-title">${s.q}</div>`;
  if(s.type==='chips'){
    if(s.multi) html+=`<div class="q-hint" style="font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;letter-spacing:0;text-transform:none;opacity:0.6;margin-bottom:12px">more than one? go for it</div>`;
    html+=`<div class="chips" id="chips-${s.id}">`;
    s.options.forEach(o=>html+=`<div class="chip" data-v="${o}">${o}</div>`);
    if(s.multi) html+=`</div><button class="next-btn" id="nxt" style="font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;text-transform:none;letter-spacing:0">looks good →</button>`; else html+=`</div>`;
  } else if(s.type==='familiarity'){
    html+=`<div class="fam-row">
      <div class="fam-card" data-v="familiar" id="fRings"><div class="fam-title">Keep it familiar</div><div class="fam-desc">Music they already love, just better chosen</div></div>
      <div class="fam-card" data-v="discovery" id="fSurprise"><div class="fam-title">Surprise me</div><div class="fam-desc">The kind that makes them reach for Shazam</div></div>
    </div><button class="next-btn" id="nxt">Next →</button>`;
  } else {
    html+=`<textarea id="txtExtra" placeholder="${s.placeholder}"></textarea><button class="next-btn show" id="nxt">Next →</button>`;
  }
  c.innerHTML=html;

  if(s.type==='chips'){
    const ce=c.querySelector(`#chips-${s.id}`);
    const nb=c.querySelector('#nxt');
    const chipColors=['#E8856A','#8BAF8B','#A89BC2','#F2B880','#6BBFB5','#E63946','#9B5DE5','#FF6B35','#06D6A0','#FF4D6D','#118AB2'];
    ce.addEventListener('click',e=>{
      const ch=e.target.closest('.chip');if(!ch)return;
      coinSound();
      if(s.multi){
        ch.classList.toggle('on');
        if(ch.classList.contains('on')){
          const idx=Array.from(ce.querySelectorAll('.chip')).indexOf(ch);
          const col=chipColors[idx%chipColors.length];
          ch.style.background=col;ch.style.borderColor=col;ch.style.color='#fff';ch.style.boxShadow='4px 4px 0 #0F0F0F';
        } else {
          ch.style.background='';ch.style.borderColor='';ch.style.color='';ch.style.boxShadow='';
        }
      } else {
        ce.querySelectorAll('.chip').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';x.style.color='';x.style.boxShadow='';});
        ch.classList.add('on');
        const idx=Array.from(ce.querySelectorAll('.chip')).indexOf(ch);
        const col=chipColors[idx%chipColors.length];
        ch.style.background=col;ch.style.borderColor=col;ch.style.color='#fff';ch.style.boxShadow='4px 4px 0 #0F0F0F';ch.style.transform='translate(-1px,-1px)';
      }
      const sel=[...ce.querySelectorAll('.chip.on')].map(x=>x.dataset.v);
      answers[s.id]=s.multi?sel.join(', '):sel[0];
      if(nb) nb.classList.toggle('show',sel.length>0);
      if(!s.multi && sel.length>0) setTimeout(()=>{current=i+1;showStep(current);},350);
    });
    if(nb) nb.addEventListener('click',()=>{if(answers[s.id]){current=i+1;showStep(current);}});
  } else if(s.type==='familiarity'){
    const nb=c.querySelector('#nxt');
    const famColors=['#FFD166','#7B4FBF'];
    ['fRings','fSurprise'].forEach((id,idx)=>{
      c.querySelector('#'+id).addEventListener('click',function(){
        coinSound();
        c.querySelectorAll('.fam-card').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';});
        this.classList.add('on');
        this.style.background=famColors[idx];
        this.style.borderColor=famColors[idx];
        answers.familiarity=this.dataset.v;nb.classList.add('show');
      });
    });
    if(nb) nb.addEventListener('click',()=>{current=i+1;showStep(current);});
  } else {
    c.querySelector('#nxt').addEventListener('click',()=>{
      answers.extra=c.querySelector('#txtExtra').value.trim();current=i+1;showStep(current);
    });
  }
}

function showGenerate(){
  setProgress(STEPS.length);
  qScreen.className='show bg-q5';
  document.getElementById('qContent').innerHTML=`
    <div class="q-num">READY</div>
    <div class="q-title" style="margin-bottom:20px">Your space is ready for its folio.</div>
    <button class="gen-btn" id="genBtn">Set the mood ✦</button>`;
  document.getElementById('genBtn').addEventListener('click',generate);
}

function buildPrompt(){
  return `Generate a sonic brief for this restaurant. Be deeply culturally specific — name exact eras, cities, scenes, movements. Never recommend anything generic. Inputs: Cuisine: ${answers.cuisine}, Vibe: ${answers.vibe}, Service: ${answers.time}, Crowd: ${answers.crowd}, Music direction: ${answers.familiarity==='familiar'?'familiar and nostalgic — music they already know and love, just better chosen':'discovery — music that surprises and makes people reach for Shazam'}, Extra context: ${answers.extra||'none'}.

Respond with ONLY valid JSON, no markdown:
{"identity":"one punchy evocative line capturing this restaurant's sonic soul","badge":"2-3 word genre or scene label","color":"amber or purple or teal or pink","why":"2-3 sentences with specific cultural reasoning — name the exact era, geography, scene or movement","artists":[{"name":"Artist","why":"one specific culturally grounded sentence","search":"spotify search query"},{"name":"Artist","why":"one sentence","search":"spotify search query"},{"name":"Artist","why":"one sentence","search":"spotify search query"},{"name":"Artist","why":"one sentence","search":"spotify search query"}],"tempo":{"pre":{"bpm":"BPM range","desc":"mood for pre-service"},"peak":{"bpm":"BPM range","desc":"mood for peak service"},"late":{"bpm":"BPM range","desc":"mood for wind down"}},"avoid":["specific thing","specific thing","specific thing","specific thing"],"spotifyQuery":"search query that surfaces playlists on Spotify"}`;
}

async function generate(){
  const btn=document.getElementById('genBtn');
  powerUp();btn.disabled=true;btn.textContent='Setting the mood...';
  document.getElementById('briefLoad').classList.add('show');
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('qContent').style.display='none';
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:buildPrompt()})});
    const data=await res.json();
    if(!data.result)throw new Error();
    renderResult(data.result);
  }catch(e){
    document.getElementById('briefLoad').classList.remove('show');
    document.getElementById('errMsg').classList.add('show');
    document.getElementById('qContent').style.display='block';
    btn.disabled=false;btn.textContent='Set the mood ✦';
  }
}

const cMap={
  amber:{bg:'#FFF8E6',border:'#FFD166',badgeBg:'#FFD166',badgeText:'#412402'},
  purple:{bg:'#F0ECFA',border:'#9B5DE5',badgeBg:'#9B5DE5',badgeText:'#fff'},
  teal:{bg:'#E6FAF4',border:'#06D6A0',badgeBg:'#06D6A0',badgeText:'#04342C'},
  pink:{bg:'#FAE6EC',border:'#FF4D6D',badgeBg:'#FF4D6D',badgeText:'#fff'}
};

function renderResult(raw){
  document.getElementById('briefLoad').classList.remove('show');
  try{
    const clean=raw.replace(/```json|```/g,'').trim();
    const d=JSON.parse(clean);
    const c=cMap[d.color]||cMap.amber;
    qScreen.classList.remove('show');
    const rs=document.getElementById('resultScreen');
    rs.classList.add('show');
    const banner=document.getElementById('rBanner');
    banner.style.background=c.bg;banner.style.borderColor=c.border;
    const badge=document.getElementById('rBadge');
    badge.style.background=c.badgeBg;badge.style.color=c.badgeText;badge.style.borderColor=c.border;badge.textContent=d.badge;
    document.getElementById('rIdentity').textContent=d.identity;
    document.getElementById('rWhy').textContent=d.why;
    const hoverColors=['#FFD166','#E8856A','#8BAF8B','#A89BC2'];
    document.getElementById('rArtists').innerHTML=d.artists.map((a,i)=>`
      <div class="a-card" onmouseenter="this.style.background='${hoverColors[i%4]}';this.style.transform='translate(-1px,-1px)';this.style.boxShadow='4px 4px 0 #0F0F0F'" onmouseleave="this.style.background='#fff';this.style.transform='';this.style.boxShadow='3px 3px 0 #0F0F0F'">
        <div class="a-name">${a.name}</div>
        <div class="a-why">${a.why}</div>
        <a class="a-spot" href="https://open.spotify.com/search/${encodeURIComponent(a.search+' playlist')}/playlists" target="_blank">Find playlists</a>
      </div>`).join('');
    document.getElementById('rPreBpm').textContent=d.tempo.pre.bpm;
    document.getElementById('rPreDesc').textContent=d.tempo.pre.desc;
    document.getElementById('rPeakBpm').textContent=d.tempo.peak.bpm;
    document.getElementById('rPeakDesc').textContent=d.tempo.peak.desc;
    document.getElementById('rLateBpm').textContent=d.tempo.late.bpm;
    document.getElementById('rLateDesc').textContent=d.tempo.late.desc;
    document.getElementById('rAvoids').innerHTML=d.avoid.map(a=>`<div class="avoid">${a}</div>`).join('');
    document.getElementById('rSpotify').href=`https://open.spotify.com/search/${encodeURIComponent(d.spotifyQuery+' playlist')}/playlists`;
    rs.scrollTop=0;
    oneUp();
  }catch(e){
    document.getElementById('errMsg').classList.add('show');
    document.getElementById('qContent').style.display='block';
  }
}

function restart(){
  answers={};current=0;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('qContent').style.display='block';
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('progFill').style.width='0%';
  landing.classList.remove('hide');
  qScreen.classList.remove('show');
}
</script>
</body>
