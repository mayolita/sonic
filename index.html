<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic* — music identity for restaurants</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --black: #0F0F0F;
  --red: #E63946;
  --yellow: #FFD166;
  --teal: #06D6A0;
  --purple: #9B5DE5;
  --orange: #FF6B35;
  --pink: #FF4D6D;
  --blue: #118AB2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--black);
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

/* CUSTOM CURSOR */
.cursor {
  width: 12px; height: 12px;
  background: var(--red);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.1s ease;
  mix-blend-mode: multiply;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1.5px solid var(--black);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transition: all 0.15s ease;
}

/* GRAIN OVERLAY */
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 128px;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#loader.hide { opacity: 0; visibility: hidden; }

.vinyl-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 2rem; }
.vinyl {
  width: 200px; height: 200px;
  border-radius: 50%;
  background: 
    radial-gradient(circle at 50% 50%, #1a1a1a 0%, #1a1a1a 12%, transparent 12%),
    radial-gradient(circle at 50% 50%, #222 0%, #222 13%, transparent 13%),
    repeating-radial-gradient(circle at 50% 50%, #111 0px, #111 1px, #1c1c1c 1px, #1c1c1c 3px);
  animation: spin 2s linear infinite;
  box-shadow: 0 0 60px rgba(230, 57, 70, 0.3);
}
.vinyl-label {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.05em;
}
.vinyl-hole {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--black);
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.loader-title {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 900;
  font-style: italic;
  color: var(--cream);
  letter-spacing: -2px;
  margin-bottom: 8px;
}
.loader-title em { color: var(--red); font-style: normal; }
.loader-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(245,240,232,0.4);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.sound-waves {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-top: 2rem;
}
.wave-bar {
  width: 3px;
  background: var(--yellow);
  border-radius: 2px;
  animation: wave 1s ease-in-out infinite;
}
.wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 32px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 24px; animation-delay: 0.4s; }
.wave-bar:nth-child(6) { height: 16px; animation-delay: 0.5s; }
.wave-bar:nth-child(7) { height: 8px; animation-delay: 0.6s; }
@keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }

/* MAIN APP */
#app {
  opacity: 0;
  transition: opacity 0.8s ease;
}
#app.show { opacity: 1; }

/* HEADER */
.header {
  padding: 2rem 2rem 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 900;
  font-style: italic;
  letter-spacing: -3px;
  line-height: 1;
  color: var(--black);
}
.wordmark em { font-style: normal; color: var(--red); }
.tagline {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: rgba(15,15,15,0.4);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* MUSIC PLAYER BAR */
.player-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--black);
  color: var(--cream);
  padding: 8px 14px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.player-bar:hover { background: #222; transform: translateY(-1px); }
.player-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.player-waves { display: flex; align-items: center; gap: 2px; }
.pw { width: 2px; background: var(--yellow); border-radius: 1px; animation: wave 0.8s ease-in-out infinite; }
.pw:nth-child(1){height:6px;animation-delay:0s}
.pw:nth-child(2){height:10px;animation-delay:0.1s}
.pw:nth-child(3){height:14px;animation-delay:0.2s}
.pw:nth-child(4){height:10px;animation-delay:0.3s}
.pw:nth-child(5){height:6px;animation-delay:0.4s}
.player-bar.paused .pw { animation: none; height: 6px !important; }
.player-bar.paused .player-dot { animation: none; opacity: 0.3; }

/* MARQUEE */
.marquee-wrap {
  overflow: hidden;
  border-top: 1.5px solid var(--black);
  border-bottom: 1.5px solid var(--black);
  margin: 1.5rem 0;
  padding: 10px 0;
  background: var(--yellow);
}
.marquee-track {
  display: flex;
  gap: 0;
  animation: marquee 20s linear infinite;
  white-space: nowrap;
}
.marquee-item {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-style: italic;
  font-weight: 700;
  color: var(--black);
  padding: 0 2rem;
  flex-shrink: 0;
}
.marquee-dot { color: var(--red); font-style: normal; }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* MAIN CONTENT */
.main { padding: 0 2rem 6rem; max-width: 640px; margin: 0 auto; }

/* THREAD */
.thread { display: flex; flex-direction: column; gap: 2.5rem; }

.step {
  opacity: 0;
  transform: translateY(16px);
  animation: rise 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes rise { to { opacity: 1; transform: translateY(0); } }

.q-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(15,15,15,0.4);
  margin-bottom: 8px;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  font-style: italic;
  color: var(--black);
  margin-bottom: 18px;
  line-height: 1.2;
}

/* CHIPS */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 18px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--black);
  background: transparent;
  color: var(--black);
  transition: all 0.12s;
  user-select: none;
  letter-spacing: 0.02em;
}
.chip:hover { background: var(--black); color: var(--cream); transform: translateY(-1px); }
.chip.on { background: var(--black); color: var(--cream); }

.chip.c-amber.on { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
.chip.c-purple.on { background: var(--purple); color: #fff; border-color: var(--purple); }
.chip.c-teal.on { background: var(--teal); color: var(--black); border-color: var(--teal); }
.chip.c-pink.on { background: var(--pink); color: #fff; border-color: var(--pink); }

/* FAMILIARITY */
.fam-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fam-card {
  padding: 24px 20px;
  border: 2px solid var(--black);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  background: transparent;
}
.fam-card:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 var(--black); }
.fam-card.on.fam-rings { background: var(--yellow); border-color: var(--yellow); box-shadow: 4px 4px 0 var(--black); }
.fam-card.on.fam-surprise { background: var(--purple); border-color: var(--purple); color: #fff; box-shadow: 4px 4px 0 var(--black); }
.fam-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; font-style: italic; margin-bottom: 6px; }
.fam-desc { font-family: 'Space Mono', monospace; font-size: 10px; line-height: 1.6; opacity: 0.7; }

/* TEXTAREA */
textarea {
  width: 100%;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  height: 80px;
  resize: none;
  border: 2px solid var(--black);
  border-radius: 12px;
  padding: 14px 16px;
  background: transparent;
  color: var(--black);
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
  margin-top: 4px;
}
textarea:focus { box-shadow: 4px 4px 0 var(--black); }
textarea::placeholder { opacity: 0.35; }

/* BUTTONS */
.next-btn {
  margin-top: 14px;
  padding: 10px 24px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--black);
  background: transparent;
  color: var(--black);
  transition: all 0.12s;
  display: none;
  letter-spacing: 0.05em;
}
.next-btn:hover { background: var(--black); color: var(--cream); transform: translateY(-1px); }
.next-btn.show { display: inline-block; }

.confirmed-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.confirmed-label { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(15,15,15,0.4); }
.confirmed-pill {
  padding: 5px 14px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  background: var(--black);
  color: var(--cream);
  border: 1.5px solid var(--black);
}

.generate-btn {
  width: 100%;
  padding: 18px;
  border: 2px solid var(--black);
  border-radius: 16px;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  font-style: italic;
  cursor: pointer;
  background: var(--red);
  color: #fff;
  margin-top: 14px;
  transition: all 0.15s;
  box-shadow: 4px 4px 0 var(--black);
  letter-spacing: -0.5px;
}
.generate-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--black); }
.generate-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--black); }
.generate-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: 2px 2px 0 var(--black); }

/* LOADER */
.brief-loader { text-align: center; padding: 3rem 0; display: none; }
.brief-loader.show { display: block; }
.brief-loader-vinyl {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: repeating-radial-gradient(circle at 50% 50%, #0F0F0F 0px, #0F0F0F 1px, #222 1px, #222 3px);
  animation: spin 1.5s linear infinite;
  margin: 0 auto 1rem;
  position: relative;
}
.brief-loader-vinyl::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--red);
}
.brief-loader-text {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(15,15,15,0.4);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.error-msg {
  background: #fff0f0;
  border: 1.5px solid var(--red);
  color: var(--red);
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  display: none;
  margin-top: 10px;
}
.error-msg.show { display: block; }

/* RESULT */
.result { display: none; margin-top: 2.5rem; }
.result.show { display: block; }

.r-banner {
  border: 2px solid var(--black);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.r-banner::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: repeating-radial-gradient(circle at 50% 50%, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px);
}
.r-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border: 1.5px solid;
  margin-bottom: 14px;
}
.r-identity {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 900;
  font-style: italic;
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -1px;
}
.r-why {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.75;
  opacity: 0.75;
}

.sec-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: rgba(15,15,15,0.4);
  margin-bottom: 12px;
  margin-top: 2rem;
}

.artists { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.artist-card {
  padding: 16px;
  border: 1.5px solid var(--black);
  border-radius: 14px;
  background: transparent;
  transition: all 0.12s;
}
.artist-card:hover { background: var(--black); color: var(--cream); transform: translateY(-2px); box-shadow: 3px 3px 0 rgba(15,15,15,0.3); }
.artist-card:hover .artist-why { color: rgba(245,240,232,0.6); }
.artist-card:hover .artist-spot { color: #1DB954; }
.artist-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; font-style: italic; margin-bottom: 5px; }
.artist-why { font-family: 'DM Sans', sans-serif; font-size: 12px; color: rgba(15,15,15,0.6); line-height: 1.55; transition: color 0.12s; }
.artist-spot { display: inline-block; margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: #1DB954; text-decoration: none; letter-spacing: 0.03em; }

.tempo-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.tempo-card {
  padding: 16px;
  border: 1.5px solid var(--black);
  border-radius: 14px;
  text-align: center;
}
.tempo-tag { font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; opacity: 0.5; }
.tempo-bpm { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; font-style: italic; margin-bottom: 4px; letter-spacing: -0.5px; }
.tempo-desc { font-family: 'DM Sans', sans-serif; font-size: 11px; line-height: 1.45; opacity: 0.6; }
.t-pre { background: var(--yellow); }
.t-peak { background: var(--teal); }
.t-late { background: var(--purple); color: #fff; }
.t-late .tempo-tag, .t-late .tempo-desc { opacity: 0.7; }

.avoids { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.avoid-tag {
  padding: 6px 14px;
  border-radius: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  background: transparent;
  color: var(--red);
  border: 1.5px solid var(--red);
}

.spotify-btn {
  display: block;
  padding: 16px 20px;
  border-radius: 14px;
  background: #1DB954;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  text-align: center;
  margin-bottom: 1rem;
  transition: all 0.15s;
  border: 2px solid var(--black);
  box-shadow: 3px 3px 0 var(--black);
  letter-spacing: 0.03em;
}
.spotify-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }

.restart-btn {
  width: 100%;
  padding: 13px;
  border-radius: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  background: transparent;
  color: rgba(15,15,15,0.4);
  border: 1.5px solid rgba(15,15,15,0.2);
  transition: all 0.12s;
  letter-spacing: 0.05em;
}
.restart-btn:hover { color: var(--black); border-color: var(--black); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grain"></div>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="vinyl-wrap">
    <div class="vinyl"></div>
    <div class="vinyl-label">SONIC<br>★<br>VOL.1</div>
    <div class="vinyl-hole"></div>
  </div>
  <div class="loader-title">sonic<em>*</em></div>
  <div class="loader-sub">music identity for restaurants</div>
  <div class="sound-waves">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="wordmark">sonic<em>*</em></div>
      <div class="tagline">music identity for restaurants</div>
    </div>
    <div class="player-bar" id="playerBar" onclick="toggleMusic()">
      <div class="player-dot"></div>
      <div class="player-waves">
        <div class="pw"></div><div class="pw"></div><div class="pw"></div><div class="pw"></div><div class="pw"></div>
      </div>
      <span id="playerLabel">now playing</span>
    </div>
  </div>

  <div class="marquee-wrap">
    <div class="marquee-track" id="marquee"></div>
  </div>

  <div class="main">
    <div class="thread" id="thread"></div>

    <div class="brief-loader" id="briefLoader">
      <div class="brief-loader-vinyl"></div>
      <div class="brief-loader-text">composing your brief...</div>
    </div>

    <div class="error-msg" id="errorMsg">Something went wrong. Try again.</div>

    <div class="result" id="result">
      <div class="r-banner" id="rBanner">
        <div class="r-badge" id="rBadge"></div>
        <div class="r-identity" id="rIdentity"></div>
        <div class="r-why" id="rWhy"></div>
      </div>
      <div class="sec-label">Reference artists</div>
      <div class="artists" id="rArtists"></div>
      <div class="sec-label">Tempo by service</div>
      <div class="tempo-row">
        <div class="tempo-card t-pre"><div class="tempo-tag">Pre-service</div><div class="tempo-bpm" id="rPreBpm"></div><div class="tempo-desc" id="rPreDesc"></div></div>
        <div class="tempo-card t-peak"><div class="tempo-tag">Peak service</div><div class="tempo-bpm" id="rPeakBpm"></div><div class="tempo-desc" id="rPeakDesc"></div></div>
        <div class="tempo-card t-late"><div class="tempo-tag">Wind down</div><div class="tempo-bpm" id="rLateBpm"></div><div class="tempo-desc" id="rLateDesc"></div></div>
      </div>
      <div class="sec-label">Never play</div>
      <div class="avoids" id="rAvoid"></div>
      <a class="spotify-btn" id="rSpotify" href="#" target="_blank">Find playlists on Spotify ↗</a>
      <button class="restart-btn" onclick="restart()">Start over</button>
    </div>
  </div>
</div>

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx-6+'px'; cursor.style.top = my-6+'px'; });
function animRing() { rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left = rx-18+'px'; ring.style.top = ry-18+'px'; requestAnimationFrame(animRing); }
animRing();

// MARQUEE
const items = ['What should your restaurant sound like?','★','Does your music match your food?','★','Stop playing the same Spotify playlist','★','Give your space a sonic identity','★','What should your restaurant sound like?','★','Does your music match your food?','★','Stop playing the same Spotify playlist','★','Give your space a sonic identity','★'];
const track = document.getElementById('marquee');
track.innerHTML = items.map(i => `<span class="marquee-item">${i === '★' ? '<span class="marquee-dot">★</span>' : i}</span>`).join('');

// LOADER
let musicStarted = false;
setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').classList.add('show');
  setTimeout(() => {
    const music = document.getElementById('bgMusic');
    music.volume = 0.15;
    music.play().then(() => { musicStarted = true; }).catch(() => {});
  }, 400);
}, 2800);

function toggleMusic() {
  const music = document.getElementById('bgMusic');
  const bar = document.getElementById('playerBar');
  const label = document.getElementById('playerLabel');
  if (music.paused) {
    music.play();
    bar.classList.remove('paused');
    label.textContent = 'now playing';
  } else {
    music.pause();
    bar.classList.add('paused');
    label.textContent = 'tap to play';
  }
}

// STEPS
const STEPS = [
  { id: 'cuisine', q: "What are you serving?", type: 'chips', color: 'c-amber', options: ['North Indian','South Indian','Coastal seafood','Italian','Japanese','Mediterranean','Modern continental','Street food','Korean','Middle Eastern','Cafe'] },
  { id: 'vibe', q: "What does your space feel like?", type: 'chips', color: 'c-purple', options: ['Intimate and romantic','Lively and social','Quiet and contemplative','Celebratory','Luxurious and refined','Cool and effortless','Nostalgic and warm'] },
  { id: 'time', q: "When do you serve?", type: 'chips', color: 'c-teal', options: ['Breakfast and brunch','Lunch','Dinner','Late night','All day'] },
  { id: 'crowd', q: "Who comes through your door?", type: 'chips', color: 'c-pink', options: ['Couples','Friend groups','Business diners','Families','Solo diners','Young professionals'] },
  { id: 'familiarity', q: "What should the music do?", type: 'familiarity' },
  { id: 'extra', q: "Anything else about your space?", type: 'text', placeholder: "Rooftop, open kitchen, heritage building, natural wine focus... or leave blank." }
];

let answers = {}, current = 0;
const thread = document.getElementById('thread');

function addStep(html, delay=0) {
  const div = document.createElement('div');
  div.className = 'step';
  div.style.animationDelay = delay+'ms';
  div.innerHTML = html;
  thread.appendChild(div);
  setTimeout(() => div.scrollIntoView({ behavior:'smooth', block:'nearest' }), delay+80);
  return div;
}

function showStep(i) {
  if (i >= STEPS.length) { showGenerate(); return; }
  const s = STEPS[i];
  let html = '';
  if (s.type === 'chips') {
    html = `<div class="q-label">0${i+1} / 06</div><div class="q-text">${s.q}</div><div class="chips" id="chips-${s.id}">`;
    s.options.forEach(o => html += `<div class="chip ${s.color}" data-v="${o}">${o}</div>`);
    html += `</div><button class="next-btn" id="next-${s.id}">Next →</button>`;
  } else if (s.type === 'familiarity') {
    html = `<div class="q-label">05 / 06</div><div class="q-text">${s.q}</div>
    <div class="fam-row">
      <div class="fam-card fam-rings" data-v="familiar" id="famRings"><div class="fam-title">Rings a bell</div><div class="fam-desc">Music they already love, just better chosen</div></div>
      <div class="fam-card fam-surprise" data-v="discovery" id="famSurprise"><div class="fam-title">Surprise me</div><div class="fam-desc">Music that makes them reach for Shazam</div></div>
    </div>
    <button class="next-btn" id="next-familiarity">Next →</button>`;
  } else if (s.type === 'text') {
    html = `<div class="q-label">06 / 06</div><div class="q-text">${s.q}</div><textarea id="txtExtra" placeholder="${s.placeholder}"></textarea><button class="next-btn show" id="next-extra">Next →</button>`;
  }
  const el = addStep(html, 100);
  if (s.type === 'chips') {
    const chipsEl = el.querySelector(`#chips-${s.id}`);
    const nextBtn = el.querySelector(`#next-${s.id}`);
    chipsEl.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      answers[s.id] = chip.dataset.v;
      nextBtn.classList.add('show');
    });
    nextBtn.addEventListener('click', () => confirmStep(i, el, answers[s.id]));
  } else if (s.type === 'familiarity') {
    const nextBtn = el.querySelector('#next-familiarity');
    ['famRings','famSurprise'].forEach(id => {
      el.querySelector('#'+id).addEventListener('click', function() {
        el.querySelectorAll('.fam-card').forEach(c => c.classList.remove('on'));
        this.classList.add('on');
        answers.familiarity = this.dataset.v;
        nextBtn.classList.add('show');
      });
    });
    nextBtn.addEventListener('click', () => confirmStep(i, el, answers.familiarity === 'familiar' ? 'Rings a bell' : 'Surprise me'));
  } else if (s.type === 'text') {
    el.querySelector('#next-extra').addEventListener('click', () => {
      answers.extra = el.querySelector('#txtExtra').value.trim();
      confirmStep(i, el, answers.extra || 'No extra context');
    });
  }
}

function confirmStep(i, el, label) {
  const s = STEPS[i];
  el.innerHTML = `<div class="confirmed-row"><span class="confirmed-label">${s.q}</span><span class="confirmed-pill">${label}</span></div>`;
  current = i+1;
  setTimeout(() => showStep(current), 200);
}

function showGenerate() {
  addStep(`<div class="q-text" style="margin-bottom:16px">Ready. Let's build your sonic identity.</div><button class="generate-btn" id="genBtn">Generate brief ✦</button>`, 100);
  document.getElementById('genBtn').addEventListener('click', generate);
}

function buildPrompt() {
  return `Generate a sonic brief for this restaurant. Be deeply culturally specific — name exact eras, cities, scenes, movements. Never recommend anything generic or obvious. Inputs: Cuisine: ${answers.cuisine}, Vibe: ${answers.vibe}, Service: ${answers.time}, Crowd: ${answers.crowd}, Music direction: ${answers.familiarity === 'familiar' ? 'familiar and nostalgic — music they already know and love, just better chosen' : 'discovery — music that surprises and makes people reach for Shazam'}, Extra context: ${answers.extra || 'none'}.

Respond with ONLY valid JSON, no markdown, no explanation:
{"identity":"one punchy evocative line capturing this restaurant's sonic soul","badge":"2-3 word genre or scene label that feels discovered not generic","color":"amber or purple or teal or pink","why":"2-3 sentences with specific cultural reasoning — name the exact era, geography, scene or movement. No vague genre names.","artists":[{"name":"Artist name","why":"one specific culturally grounded sentence","search":"spotify search query"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"},{"name":"Artist name","why":"one specific sentence","search":"spotify search query"}],"tempo":{"pre":{"bpm":"BPM range","desc":"specific mood for pre-service"},"peak":{"bpm":"BPM range","desc":"specific mood for peak service"},"late":{"bpm":"BPM range","desc":"specific mood for wind down"}},"avoid":["specific thing to avoid","specific thing","specific thing","specific thing"],"spotifyQuery":"specific search query for curated playlists on Spotify"}`;
}

async function generate() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Composing...';
  document.getElementById('briefLoader').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('result').classList.remove('show');
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() })
    });
    const data = await res.json();
    if (!data.result) throw new Error('No result');
    renderResult(data.result);
  } catch(e) {
    document.getElementById('briefLoader').classList.remove('show');
    document.getElementById('errorMsg').classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Try again ✦';
  }
}

const colorMap = {
  amber: { bg:'#FFF8E6', border:'#FFD166', text:'#1A1A1A', badgeBg:'#FFD166', badgeText:'#1A1A1A' },
  purple: { bg:'#F3EEFF', border:'#9B5DE5', text:'#1A1A1A', badgeBg:'#9B5DE5', badgeText:'#fff' },
  teal: { bg:'#E6FFF7', border:'#06D6A0', text:'#1A1A1A', badgeBg:'#06D6A0', badgeText:'#1A1A1A' },
  pink: { bg:'#FFF0F3', border:'#FF4D6D', text:'#1A1A1A', badgeBg:'#FF4D6D', badgeText:'#fff' }
};

function renderResult(raw) {
  document.getElementById('briefLoader').classList.remove('show');
  try {
    const clean = raw.replace(/```json|```/g,'').trim();
    const d = JSON.parse(clean);
    const c = colorMap[d.color] || colorMap.amber;
    const banner = document.getElementById('rBanner');
    banner.style.background = c.bg; banner.style.borderColor = c.border;
    const badge = document.getElementById('rBadge');
    badge.style.background = c.badgeBg; badge.style.color = c.badgeText; badge.style.borderColor = c.border; badge.textContent = d.badge;
    document.getElementById('rIdentity').textContent = d.identity;
    document.getElementById('rWhy').textContent = d.why;
    document.getElementById('rArtists').innerHTML = d.artists.map(a => `
      <div class="artist-card">
        <div class="artist-name">${a.name}</div>
        <div class="artist-why">${a.why}</div>
        <a class="artist-spot" href="https://open.spotify.com/search/${encodeURIComponent(a.search)}" target="_blank">Find on Spotify ↗</a>
      </div>`).join('');
    document.getElementById('rPreBpm').textContent = d.tempo.pre.bpm;
    document.getElementById('rPreDesc').textContent = d.tempo.pre.desc;
    document.getElementById('rPeakBpm').textContent = d.tempo.peak.bpm;
    document.getElementById('rPeakDesc').textContent = d.tempo.peak.desc;
    document.getElementById('rLateBpm').textContent = d.tempo.late.bpm;
    document.getElementById('rLateDesc').textContent = d.tempo.late.desc;
    document.getElementById('rAvoid').innerHTML = d.avoid.map(a => `<div class="avoid-tag">${a}</div>`).join('');
    document.getElementById('rSpotify').href = `https://open.spotify.com/search/${encodeURIComponent(d.spotifyQuery)}`;
    document.getElementById('result').classList.add('show');
    setTimeout(() => document.getElementById('result').scrollIntoView({ behavior:'smooth' }), 100);
  } catch(e) {
    document.getElementById('errorMsg').classList.add('show');
  }
}

function restart() {
  answers = {}; current = 0;
  thread.innerHTML = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('briefLoader').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  showStep(0);
}

showStep(0);
</script>
